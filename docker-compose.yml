# /opt/knowledge-platform/docker-compose.yml
version: '3.8'

services:
  # ========== Backend ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-10000}:10000"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:mysql://${IP_ADDR}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      MINIO_ENDPOINT: http://${IP_ADDR}:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: knowledge-files


      #SPRING_REDIS_HOST: 172.17.0.1
      #SPRING_REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}

      SERVER_PORT: 10000
      SERVER_SERVLET_CONTEXT_PATH: /api
    networks:
      - knowledge-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Nginx ==========
  nginx:
    image: nginx:alpine
    container_name: knowledge-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-5566}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - knowledge-net

networks:
  knowledge-net:
    driver: bridge